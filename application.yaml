spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/recipe_app}
    username: ${SPRING_DATASOURCE_USERNAME:recipe_user}
    password: ${SPRING_DATASOURCE_PASSWORD:recipe_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on-param
    include-exception: true


# App-specific config
app:
  todoist:
    client-id: ${TODOIST_CLIENT_ID}
    client-secret: ${TODOIST_CLIENT_SECRET}
    redirect-uri: ${TODOIST_REDIRECT_URI:http://localhost:8080/api/auth/todoist/callback}
    scope: "data:read_write,data:delete"
    frontend-callback-url: ${TODOIST_FRONTEND_CALLBACK:http://localhost:4200}